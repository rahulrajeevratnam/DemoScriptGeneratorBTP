# For plain `cf push` deployments (as an alternative to `mbt build` + `cf deploy`).
#
# The aicore/objectstore service instances are NOT created automatically by
# this manifest — create them first, e.g.:
#   cf create-service aicore extended demoscriptgenerator-aicore
#   cf create-service objectstore s3-standard demoscriptgenerator-objectstore
# then: cf push
#
# Check `cf marketplace -e objectstore` for the plans actually entitled in
# your subaccount — they vary by hyperscaler/region. Use the S3-compatible
# plan (credentials shaped as bucket/access_key_id/secret_access_key/host) —
# this app's lib/objectStore.js talks to it via the AWS S3 SDK.

---
applications:
  - name: demoscriptgenerator
    memory: 1024M
    disk_quota: 1024M
    instances: 1
    buildpacks:
      - nodejs_buildpack
    command: npm start
    env:
      AICORE_ORCHESTRATION_MODEL: anthropic--claude-4.6-sonnet
      AICORE_MAX_TOKENS: 8192
      # Experimental /api/generate-gemini pipeline — comparison only, does
      # not affect the Claude pipeline above.
      AICORE_GEMINI_MODEL: gemini-2.5-flash
      AICORE_GEMINI_MAX_TOKENS: 16384
    services:
      - demoscriptgenerator-aicore
      - demoscriptgenerator-objectstore
